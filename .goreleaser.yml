# ─────────────────────────────────────────────────────────────────────────────
# EMBFinder — GoReleaser v2 Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# Build type: HEADLESS (CGO_ENABLED=0 — fully static, no libc dependency)
#   Linux   → runs on any distro without installing anything
#   Windows → no MSVC runtime required, works on Win 10/11
#   macOS   → arm64 (M-series) + amd64 (Intel)
#
# The native Wails desktop window is excluded from these builds.
# The app opens the system browser automatically on first launch.
#
# Local snapshot (no git tag required):
#   goreleaser release --snapshot --clean
#   # binaries in dist/
#
# Production release (requires a tag):
#   git tag v1.0.0 && git push origin v1.0.0
#   # GoReleaser is triggered automatically by GitHub Actions
#
# ─────────────────────────────────────────────────────────────────────────────

version: 2
project_name: embfinder

# ── Source directory ──────────────────────────────────────────────────────────
# All Go source is inside go-server/
before:
  hooks:
    - go mod tidy

# ── Builds ────────────────────────────────────────────────────────────────────
builds:
  - id: embfinder
    dir: go-server
    binary: embfinder

    # -tags headless:
    #   Selects main_headless.go (no Wails, no CGO requirement)
    #   Skips main_desktop.go (Wails native window)
    tags:
      - headless

    # CGO_ENABLED=0 → static binary, no shared library deps
    env:
      - CGO_ENABLED=0

    # Target platforms
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

    # Windows arm64 has no mainstream user base yet
    ignore:
      - goos: windows
        goarch: arm64

    # ldflags:
    #   -s         strip symbol table        → smaller binary, no function names
    #   -w         strip DWARF debug info    → removes file/line info
    #   -X main.version    inject version string
    #   -X main.buildDate  inject build date (reproducible builds)
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.buildDate={{.Date}}

    mod_timestamp: "{{ .CommitTimestamp }}"

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - id: embfinder
    ids: [embfinder]
    # Filename pattern: embfinder_v1.0.0_linux_amd64.tar.gz
    name_template: "embfinder_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        format: zip      # Windows users expect .zip

    # Ship essential files alongside the binary
    files:
      - README.md
      - LICENSE
      - .env.example
      - docker-compose.yml

# ── Linux packages (deb / rpm / apk) ─────────────────────────────────────────
nfpms:
  - id: linux-packages
    package_name: embfinder
    homepage: https://github.com/RhythmItaliya/EMBFinder
    description: |
      Image-to-embroidery visual search engine.
      Upload a garment photo, find the matching .EMB design in under 50 ms.
      Powered by CLIP ViT-L-14 on CUDA or CPU.
    maintainer: EMBFinder Contributors <noreply@github.com>
    license: MIT

    formats:
      - deb    # Debian, Ubuntu, Linux Mint
      - rpm    # Fedora, RHEL, CentOS, openSUSE
      - apk    # Alpine Linux

    bindir: /usr/local/bin

    contents:
      - src: README.md
        dst: /usr/share/doc/embfinder/README.md
      - src: .env.example
        dst: /etc/embfinder/env.example
        type: config|noreplace   # never overwrite user-edited config on upgrade

    # Systemd service so EMBFinder survives reboots on servers
    scripts:
      postinstall: scripts/postinstall.sh
      preremove:   scripts/preremove.sh

# ── Checksums ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: "Other Changes"
      order: 999

# ── Snapshot naming ───────────────────────────────────────────────────────────
snapshot:
  version_template: "{{.Tag}}-dev+{{.ShortCommit}}"

# ── GitHub Release ────────────────────────────────────────────────────────────
release:
  github:
    owner: RhythmItaliya
    name: EMBFinder
  draft: false
  prerelease: auto   # marks as pre-release if tag contains -alpha/-beta/-rc
  header: |
    ## EMBFinder {{ .Tag }}

    ### Quick Install

    **Linux (Debian/Ubuntu)**
    ```bash
    curl -LO https://github.com/RhythmItaliya/EMBFinder/releases/download/{{ .Tag }}/embfinder_{{ .Tag }}_linux_amd64.deb
    sudo dpkg -i embfinder_{{ .Tag }}_linux_amd64.deb
    embfinder
    ```

    **Windows** — Download `embfinder_{{ .Tag }}_windows_amd64.zip`, extract, run `embfinder.exe`

    **macOS (Apple Silicon)** — Download `embfinder_{{ .Tag }}_darwin_arm64.tar.gz`
    ```bash
    tar -xzf embfinder_{{ .Tag }}_darwin_arm64.tar.gz
    ./embfinder
    ```

    > **Python services** (AI embedder + EMB renderer) are required for indexing.
    > Start them with: `docker compose up -d embedder emb-engine`
    > See [README.md](https://github.com/RhythmItaliya/EMBFinder#readme) for full setup.
