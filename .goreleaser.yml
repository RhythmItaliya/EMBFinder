# GoReleaser — builds EMBFinder as native .exe / .deb / .dmg
# Run: goreleaser release --snapshot --clean
project_name: embfinder

builds:
  - id: embfinder
    dir: go-server
    binary: embfinder
    env: [CGO_ENABLED=0]
    goos:  [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags: ["-s", "-w", "-X main.version={{.Version}}"]

archives:
  - id: embfinder
    builds: [embfinder]
    name_template: "embfinder_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - package_name: embfinder
    homepage: https://github.com/yourorg/embfinder
    description: "Embroidery Visual Search Engine"
    maintainer: "EMBFinder"
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/local/bin

dmgbuild:
  - name: EMBFinder
    volume_name: EMBFinder
    output_path: "dist/EMBFinder_{{.Version}}.dmg"
    files:
      - src: "dist/embfinder_{{.Version}}_darwin_amd64/embfinder"
        dst: EMBFinder

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{.Tag}}-dev"
