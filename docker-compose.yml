version: "3.9"
# ─────────────────────────────────────────────────────────────────────────────
# EMBFinder — docker compose up --build
# Edit .env to set your embroidery folder path.
# ─────────────────────────────────────────────────────────────────────────────

services:

  embfinder:
    build: ./go-server
    image: embfinder:latest
    container_name: embfinder
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - embfinder_data:/data
      - ${EMB_LIB:-/path/to/your/embroidery}:/mnt/lib:ro
    environment:
      EMBEDDER_URL: http://embedder:8766
      EMB_ENGINE_URL: http://emb-engine:8767
    depends_on:
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8765/api/status || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3

  embedder:
    build: ./embedder
    image: embfinder-embedder:latest
    container_name: embfinder-embedder
    restart: unless-stopped
    volumes:
      - clip_cache:/root/.cache
      - ${EMB_LIB:-/path/to/your/embroidery}:/mnt/lib:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8766/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  emb-engine:
    build:
      context: ./emb-engine
      args:
        # 1. Extract your installer to emb-engine/ folder
        # 2. Set the filename here (e.g., setup.exe or 1.exe)
        ES_INSTALLER: "1.exe" 
        SKIP_ES: "0"
    container_name: emb-engine
    restart: unless-stopped
    ports:
      - "8767:8767"
    environment:
      - EMB_ENGINE_DIR=Wilcom # Adjust if your installation folder is different
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8767/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    image: embfinder-emb-engine:latest
    volumes:
      - ${EMB_LIB:-/path/to/your/embroidery}:/mnt/lib:ro
      - ./emb-engine/installer:/installer
    shm_size: 512m
    cap_add:
      - SYS_PTRACE
    # Removed profiles to ensure it runs by default for management


volumes:
  embfinder_data:
  clip_cache:
